name: Scrape EBS uitval
on:
  schedule:
    - cron: '*/15 5-22 * * *'  # Elke 15 min tussen 05:00 en 22:45 UTC
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Dependencies installeren
        run: pip install beautifulsoup4 --break-system-packages
      - name: Data-map aanmaken
        run: mkdir -p data
      - name: EBS uitval scrapen
        run: python scrape_ebs.py
        continue-on-error: true
      - name: Bekendmakingen scrapen
        run: python scrape_rss.py
        continue-on-error: true
      - name: Wijzigingen committen en pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ebs_uitval.json data/bekendmakingen.json
          git diff --staged --quiet || git commit -m "ebs+rss: update $(date +'%Y-%m-%d %H:%M')"
          git push
